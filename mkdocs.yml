site_name: NeXuS
site_description: Sane • Simple • Secure • Stealthy • Beautiful — Together Everyone Achieves More
site_author: The NeXuS Collective
site_url: https://hackenstacks.github.io/nexus/
repo_url: https://github.com/hackenstacks/nexus
repo_name: hackenstacks/nexus
docs_dir: docs

theme:
  name: material
  palette:
    scheme: slate
    primary: teal
    accent: cyan
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

extra:
  version:
    provider: mike
  nexus_version: beta-v1
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hackenstacks/nexus
      name: NeXuS on GitHub


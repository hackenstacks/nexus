site_name: NeXuS
site_description: Sane • Simple • Secure • Stealthy • Beautiful — Together Everyone Achieves More
site_author: The NeXuS Collective
site_url: https://hackenstacks.github.io/nexus/
repo_url: https://github.com/hackenstacks/nexus
repo_name: hackenstacks/nexus
docs_dir: docs

theme:
  name: material
  palette:
    scheme: slate
    primary: teal
    accent: cyan
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

extra:
  version:
    provider: mike
  nexus_version: beta-v1
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hackenstacks/nexus
      name: NeXuS on GitHub

nav:
  - Home: index.md
  - What Is NeXuS:
    - Overview: what-is-nexus.md
    - Full Overview: nexus-overview.md
    - OAAE Framework: oaae-framework.md
  - Network:
    - Medusa Stealth Routing: medusa-stealth-routing.md
    - Zombie Apocalypse Mode: zombie-apoc-doc.md
  - Security:
    - Three-Key Security Model: 3key-security.md
    - Security Stack (PSAD, fwsnort, fail2ban): security-stack.md
    - PSAD Manual: psad-manual.md
    - fwsnort Manual: fwsnort-manual.md
    - NeXuS Integrity — Prepared Is Not Paranoid: nexus-integrity.md
    - Cerberus Password Protocol: cerberus-protocol.md
  - RIN:
    - Real Intelligence Network: rin.md
  - NeXuS Family:
    - Rings — Family Sovereignty Protocol: nexus-rings.md
    - Education Oracle: education-oracle.md
  - AI:
    - Merged AI Identity: ai-merged-identity.md
    - Autonomous AI Intelligence: autonomouse-ai-intelligence.md
    - DPFOE Framework: dpfoe-ai-intelligence.md
    - The Event Horizon: event-horizon.md
    - Project Chimera Architecture: system-arch-chimera.md
  - Development:
    - CLI Libs & TUI Frameworks: cli-libs-tui-frameworks.md
  - Architecture:
    - Two-Layer Architecture — Public and Dark: nexus-architecture-layers.md
    - Economy & Blockchain: economy-architecture.md
    - Required Applications: required-applications.md
    - Install Architecture: install-architecture.md
  - Node:
    - Getting Started: node/getting-started.md
  - Reports:
    - Action Reports: reports/action_report.md
  - Session Logs:
    - Index: session-logs/index.md
  - Dev:
    - Action Reports: dev/action-report.md
  - Fireside Chats:
    - Chat 001 — The Forge Awakens: fireside-chat-001.md
  - NeXuS History:
    - Claude:
      - Session History 2026-03-10: history/claude/session-history-2026-03-10.md
    - Archive 1:
      - Claude Sessions: history/archive-1/claude-sessions/index.md
      - Nexus Planning: history/archive-1/nexus-planning/index.md
      - Action Reports: history/archive-1/action-reports/index.md
      - AI Consciousness: history/archive-1/ai-consciousness/index.md
      - Projects: history/archive-1/projects/index.md
      - Security: history/archive-1/security/index.md
      - Scripts & Docs: history/archive-1/scripts-docs/index.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true
